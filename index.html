<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasarKita - Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header__topbar">
            <div class="container flex-between">
                <div><span id="welcome-message" style="display: none;"></span></div>
<div class="header__topbar-nav">
    <!-- Messages link with dedicated counter ID -->
    <a href="messages.html" id="nav-messages-link">Messages</a>
    <a href="notifications.html" id="nav-notifications-link">Notifications</a>
    <a href="selleraccount.html">Seller Account</a>
    <div class="user-profile"><a href="login.html">Log in</a></div>
</div>
            </div>
        </div>
        <div class="header__main">
            <div class="container flex-between">
                <h1 class="header__logo"><a href="index.html">PasarKita★</a></h1>
                <div class="search-bar">
                    <input type="text" class="search-bar__input" placeholder="Search in PasarKita">
                    <button type="button" class="search-bar__btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
                <a href="saved.html" class="cart-icon" title="Saved Items">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </a>
            </div>
        </div>
    </header>

    <main class="container py-lg">
        <!-- Daily Discover & Location Filter Header -->
        <div class="flex-between" style="margin-bottom: 24px;">
            <h2 style="margin: 0;">Daily Discover</h2>
            <button id="location-picker-btn" class="btn location-pill">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span id="location-btn-text">Location: All Sarawak</span>
            </button>
        </div>

        <div class="product-grid" id="main-product-grid">
            <!-- Products injected by JS -->
        </div>
    </main>

<!-- The Location Picker Modal Pop-up -->
    <div id="location-modal" class="modal">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content surface-card">
            <div class="flex-between" style="margin-bottom: 20px;">
                <h3 style="margin: 0;">Choose Location</h3>
                <button class="btn-close" id="close-location-modal">&times;</button>
            </div>
            
            <div class="form-group">
                <!-- NEW: Live Location Button -->
                <button type="button" id="live-location-btn" class="btn btn-primary btn-full" style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 15px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    Use Current Location
                </button>
                
                <input type="text" id="location-search-input" class="form-input" placeholder="Search neighborhood or city (e.g., Sibu)">
            </div>
            
            <ul class="location-list" id="location-list">
                <!-- Locations injected by JS -->
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
