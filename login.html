<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - PasarKita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SIMPLIFIED HEADER -->
    <header class="header">
        <div class="header__topbar">
            <div class="container flex-between">
                <div><span id="welcome-message" style="display: none;"></span></div>
<div class="header__topbar-nav">
    <!-- This link will now appear globally -->
    <a href="messages.html">Messages</a>
    <a href="notifications.html">Notifications</a>
    <a href="selleraccount.html">Seller Account</a>
    <div class="user-profile"><a href="login.html">Log in</a></div>
</div>
            </div>
        </div>
        <div class="header__main">
            <div class="container flex-between">
                <h1 class="header__logo"><a href="index.html">PasarKita★</a></h1>
            </div>
        </div>
    </header>

    <div class="container auth-layout">
        <div class="auth-wrapper surface-card">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" class="form-input" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="padding: 14px;">LOG IN</button>
            </form>
            <div class="auth-links">New to PasarKita? <a href="signup.html">Sign Up</a></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
