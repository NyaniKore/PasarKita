<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - PasarKita</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header__topbar">
            <div class="container flex-between">
                <div><span id="welcome-message" style="display: none;"></span></div>
<div class="header__topbar-nav">
    <!-- This link will now appear globally -->
    <a href="messages.html">Messages</a>
    <a href="notifications.html">Notifications</a>
    <a href="selleraccount.html">Seller Account</a>
    <div class="user-profile"><a href="login.html">Log in</a></div>
</div>
            </div>
        </div>
<div class="header__main">
    <div class="container flex-between">
        <h1 class="header__logo"><a href="index.html">PasarKita★</a></h1>
        
        <!-- UPDATED: Non-Pressable Seller Account Header with Store Icon -->
        <div id="header-seller-account" style="display: flex; align-items: center; gap: 8px; color: white; cursor: default;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span style="font-weight: bold; font-size: 18px;">Seller Account</span>
        </div>
    </div>
</div>
    </header>

    <main class="container py-lg">
        <!-- SOUNDCLOUD STYLE PROFILE HEADER -->
        <div class="sc-profile-header">
            <div class="sc-banner" id="shop-banner">
                <label for="banner-upload" class="sc-banner-edit">📷 Update Banner</label>
                <input type="file" id="banner-upload" accept="image/*" hidden>
            </div> 
            
            <div class="sc-profile-content">
                <div class="sc-avatar-wrapper">
                    <img id="shop-avatar" src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=400" alt="Shop Avatar">
                    <label for="avatar-upload" class="sc-avatar-edit">Update Image</label>
                    <input type="file" id="avatar-upload" accept="image/*" hidden>
                </div>
                
                <div class="sc-info">
                    <h1 id="shop-name" class="sc-title">My Shop</h1>
                    <div id="shop-desc-container">
                        <p id="shop-desc-text" class="sc-desc">Manage your active listings and shop profile.</p>
                        <button id="show-more-desc-btn" class="show-more-btn" style="display: none;">Show more</button>
                        
                        <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;">
                            <button id="edit-desc-btn" class="btn btn-sm btn-dark" style="background: #e5e5e5; color: #333;">✎ Edit Bio</button>
                            <button id="clear-avatar-btn" class="btn btn-sm" style="background: #ffebee; color: #c62828; border: 1px solid #ffcdd2;">🗑 Clear Avatar</button>
                            <button id="clear-banner-btn" class="btn btn-sm" style="background: #ffebee; color: #c62828; border: 1px solid #ffcdd2;">🗑 Clear Banner</button>
                        </div>
                    </div>

                    <div id="shop-desc-edit" style="display: none; margin-top: 8px; width: 100%; max-width: 500px;">
                        <textarea id="shop-desc-input" class="form-input" rows="3" placeholder="Tell buyers about your shop..."></textarea>
                        <div style="display: flex; gap: 8px; margin-top: 8px;">
                            <button id="save-desc-btn" class="btn btn-primary btn-sm">Save Bio</button>
                            <button id="cancel-desc-btn" class="btn btn-dark btn-sm">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-between" style="margin-bottom: 24px;">
            <h2 style="margin: 0;">My Listings</h2>
            <a href="addproduct.html" class="btn btn-primary">+ Add New Listing</a>
        </div>

        <div id="seller-product-grid" class="product-grid">
            <!-- Items injected by JavaScript -->
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
