<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasarKita Listing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- UNIVERSAL HEADER -->
    <header class="header">
        <div class="header__topbar">
            <div class="container flex-between">
                <div><span id="welcome-message" style="display: none;"></span></div>
<div class="header__topbar-nav">
    <!-- This link will now appear globally -->
    <a href="messages.html">Messages</a>
    <a href="notifications.html">Notifications</a>
    <a href="selleraccount.html">Seller Account</a>
    <div class="user-profile"><a href="login.html">Log in</a></div>
</div>
            </div>
        </div>
        <div class="header__main">
            <div class="container flex-between">
                <h1 class="header__logo"><a href="index.html">PasarKita★</a></h1>

                </div>
                
                <!-- UPDATED: Bookmark Icon replacing the Cart -->
                <a href="saved.html" class="cart-icon" title="Saved Items">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- THIS IS THE MAGIC EMPTY CONTAINER. JAVASCRIPT WILL FILL IT! -->

    <script src="app.js"></script>

</html>
